name: CI

on:
  pull_request: &paths
    paths:
      - '*.yaml'
      - '.github/workflows/ci.yml'
  push: *paths
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ci:
    name: Building
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: ESPHome Build
        uses: esphome/build-action@4ef4722a2935eac47b7e227fe0e1f8e0f8afcc42  # v7.3.0
        with:
          yaml-file: snuffelaar-esp32.yaml
          version: 2026.5.1 #esphome-version
      - name: ESPHome Build (Factory)
        uses: esphome/build-action@4ef4722a2935eac47b7e227fe0e1f8e0f8afcc42  # v7.3.0
        with:
          yaml-file: snuffelaar-esp32.factory.yaml
          version: 2026.5.1 #esphome-version
